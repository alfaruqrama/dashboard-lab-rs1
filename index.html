<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Kunjungan Lab RS Petrokimia Gresik</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:    #f0f4f8;
  --bg2:   #e6ecf3;
  --white: #ffffff;
  --s1:    #ffffff;
  --s2:    #f7f9fc;
  --bd:    #dde4ee;
  --bd2:   #c8d3e2;
  --ac:    #0a9e87;
  --ac-l:  #e6f7f4;
  --ac2:   #f04e37;
  --ac2-l: #fdecea;
  --ac3:   #f59e0b;
  --ac3-l: #fef3c7;
  --ac4:   #3b82f6;
  --ac4-l: #eff6ff;
  --ac5:   #8b5cf6;
  --tx:    #1a2535;
  --tx2:   #3d5068;
  --mu:    #7a8fa8;
  --shadow: 0 1px 3px rgba(26,37,53,.06), 0 4px 12px rgba(26,37,53,.06);
  --shadow-md: 0 2px 8px rgba(26,37,53,.08), 0 8px 24px rgba(26,37,53,.08);
  --r: 14px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--tx);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
content: ‘’;
position: fixed; inset: 0;
background-image:
linear-gradient(rgba(10,158,135,.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(10,158,135,.03) 1px, transparent 1px);
background-size: 40px 40px;
pointer-events: none; z-index: 0;
}

/* ── TOPBAR ── */
.topbar {
position: sticky; top: 0; z-index: 200;
background: rgba(255,255,255,0.88);
backdrop-filter: blur(16px) saturate(180%);
border-bottom: 1px solid var(–bd);
padding: 0 28px;
height: 60px;
display: flex; align-items: center; justify-content: space-between; gap: 12px;
box-shadow: 0 1px 0 var(–bd), 0 2px 16px rgba(26,37,53,.05);
}
.brand {
display: flex; align-items: center; gap: 10px;
}
.brand-icon {
width: 34px; height: 34px;
background: linear-gradient(135deg, var(–ac), #06b6d4);
border-radius: 9px;
display: flex; align-items: center; justify-content: center;
font-size: 17px;
box-shadow: 0 2px 8px rgba(10,158,135,.3);
flex-shrink: 0;
}
.brand-text { line-height: 1.2; }
.brand-name {
font-family: ‘Fraunces’, serif;
font-size: 15px; font-weight: 700;
color: var(–tx);
letter-spacing: -.01em;
}
.brand-sub {
font-size: 10px; color: var(–mu);
font-family: ‘DM Mono’, monospace;
letter-spacing: .04em;
}
.topbar-right {
display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.pill {
display: flex; align-items: center; gap: 5px;
background: var(–ac-l); border: 1px solid rgba(10,158,135,.2);
padding: 5px 12px; border-radius: 100px;
font-size: 10px; font-family: ‘DM Mono’, monospace;
color: var(–ac); font-weight: 500;
}
.pill-dot {
width: 6px; height: 6px; background: var(–ac); border-radius: 50%;
animation: blink 2s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
.tbtn {
background: var(–white); border: 1px solid var(–bd);
border-radius: 9px; padding: 7px 16px;
font-size: 12px; font-family: ‘DM Sans’, sans-serif;
font-weight: 500; color: var(–tx2); cursor: pointer;
transition: all .18s; box-shadow: var(–shadow);
}
.tbtn:hover { border-color: var(–ac); color: var(–ac); background: var(–ac-l); }
.tbtn.primary {
background: var(–ac); color: #fff; border-color: var(–ac);
box-shadow: 0 2px 8px rgba(10,158,135,.35);
}
.tbtn.primary:hover { opacity: .88; }

/* ── TABS ── */
.tab-bar {
background: var(–white);
border-bottom: 1px solid var(–bd);
padding: 0 28px;
display: flex; align-items: center; gap: 2px;
overflow-x: auto; scrollbar-width: none;
box-shadow: 0 1px 0 var(–bd);
position: relative; z-index: 1;
}
.tab {
padding: 14px 18px;
border: none; background: transparent;
font-size: 12px; font-weight: 500;
color: var(–mu); cursor: pointer;
border-bottom: 2px solid transparent;
transition: all .18s; white-space: nowrap;
font-family: ‘DM Sans’, sans-serif;
letter-spacing: .01em;
}
.tab:hover { color: var(–tx2); }
.tab.active { color: var(–ac); border-bottom-color: var(–ac); font-weight: 600; }
.tab-divider {
width: 1px; height: 18px; background: var(–bd);
margin: 0 6px; flex-shrink: 0; align-self: center;
}

/* ── MONTH SELECT DROPDOWN ── */
.month-select {
padding: 10px 14px;
border: 1px solid var(–bd);
border-radius: 10px;
background: var(–white);
color: var(–tx);
font-family: ‘DM Sans’, sans-serif;
font-size: 12px;
font-weight: 500;
cursor: pointer;
transition: all .18s;
box-shadow: var(–shadow);
margin-left: 8px;
height: 38px;
min-width: 140px;
appearance: none;
background-image: url(“data:image/svg+xml;charset=UTF-8,%3csvg xmlns=‘http://www.w3.org/2000/svg’ viewBox=‘0 0 24 24’ fill=‘none’ stroke=’%237a8fa8’ stroke-width=‘2’ stroke-linecap=‘round’ stroke-linejoin=‘round’%3e%3cpolyline points=‘6 9 12 15 18 9’%3e%3c/polyline%3e%3c/svg%3e”);
background-repeat: no-repeat;
background-position: right 8px center;
background-size: 18px;
padding-right: 32px;
}
.month-select:hover {
border-color: var(–ac);
box-shadow: 0 1px 3px rgba(10,158,135,.12), 0 4px 12px rgba(10,158,135,.08);
}
.month-select:focus {
outline: none;
border-color: var(–ac);
color: var(–ac);
box-shadow: 0 0 0 3px rgba(10,158,135,.08), 0 1px 3px rgba(10,158,135,.12), 0 4px 12px rgba(10,158,135,.08);
}
.month-select option {
color: var(–tx);
background: var(–white);
padding: 8px 12px;
border: none;
}
.month-select option:checked {
background: linear-gradient(var(–ac-l), var(–ac-l));
color: var(–ac);
font-weight: 600;
}

/* ── MAIN CONTENT ── */
.main { padding: 24px 28px; position: relative; z-index: 1; }

/* ── KPI CARDS ── */
.kpi-row {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
gap: 14px; margin-bottom: 20px;
}
.kpi {
background: var(–white);
border: 1px solid var(–bd);
border-radius: var(–r);
padding: 18px 20px;
position: relative; overflow: hidden;
transition: transform .2s, box-shadow .2s;
box-shadow: var(–shadow);
}
.kpi:hover { transform: translateY(-2px); box-shadow: var(–shadow-md); }
.kpi::after {
content: ‘’;
position: absolute; top: 0; left: 0; right: 0; height: 3px;
background: var(–kc, var(–ac));
border-radius: var(–r) var(–r) 0 0;
}
.kpi-ico {
position: absolute; top: 14px; right: 14px;
width: 32px; height: 32px; border-radius: 8px;
background: var(–kbg, var(–ac-l));
display: flex; align-items: center; justify-content: center;
font-size: 16px;
}
.kpi-lbl {
font-size: 10px; font-weight: 600; text-transform: uppercase;
letter-spacing: .1em; color: var(–mu);
font-family: ‘DM Mono’, monospace; margin-bottom: 8px;
}
.kpi-val {
font-family: ‘Fraunces’, serif;
font-size: clamp(18px, 2vw, 26px); font-weight: 700;
color: var(–kc, var(–ac)); line-height: 1;
letter-spacing: -.02em;
}
.kpi-sub { font-size: 11px; color: var(–mu); margin-top: 5px; }

/* ── GRID & CARDS ── */
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.fw { grid-column: 1 / -1; }
.card {
background: var(–white);
border: 1px solid var(–bd);
border-radius: var(–r);
padding: 22px 24px;
box-shadow: var(–shadow);
}
.card-head {
display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 16px;
}
.card-t {
font-size: 13px; font-weight: 600; color: var(–tx);
}
.card-s {
font-size: 11px; color: var(–mu);
}

/* ── EMPTY STATE ── */
.empty-state {
padding: 60px 20px;
text-align: center;
color: var(–mu);
font-size: 14px;
}

/* ── LOADING STATE ── */
.loading-state {
display: flex;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 80px 20px;
gap: 16px;
}
.loading-spinner {
width: 40px;
height: 40px;
border: 3px solid var(–bd);
border-top-color: var(–ac);
border-radius: 50%;
animation: spin 1s linear infinite;
}
@keyframes spin {
to { transform: rotate(360deg); }
}
.loading-text {
font-size: 14px;
color: var(–tx2);
font-weight: 500;
}

/* ── TABLES ── */
.tbl-wrap {
overflow-x: auto;
}
table {
width: 100%;
border-collapse: collapse;
font-size: 11px;
}
thead {
background: var(–s2);
border: 1px solid var(–bd);
}
th {
padding: 12px 8px;
text-align: left;
font-weight: 600;
color: var(–tx);
}
td {
padding: 10px 8px;
border-bottom: 1px solid var(–bd2);
}
tbody tr:hover {
background: var(–s2);
}

/* ── BADGES ── */
.bp { background: #dcfce7; color: #166534; padding: 2px 6px; border-radius: 4px; font-weight: 600; }
.bg { background: #dcfce7; color: #166534; padding: 2px 6px; border-radius: 4px; font-weight: 600; }
.by { background: #fef3c7; color: #b45309; padding: 2px 6px; border-radius: 4px; font-weight: 600; }
.br { background: #fee2e2; color: #991b1b; padding: 2px 6px; border-radius: 4px; font-weight: 600; }

/* ── ANIMATIONS ── */
.fadein {
animation: fadein 0.3s ease-in;
}
@keyframes fadein {
from { opacity: 0; }
to { opacity: 1; }
}

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
.grid2 { grid-template-columns: 1fr; }
.brand-name { font-size: 13px; }
.card { padding: 16px 18px; }
table { font-size: 10px; }
}
</style>

</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-icon">🔬</div>
    <div class="brand-text">
      <div class="brand-name">Dashboard Kunjungan Lab</div>
      <div class="brand-sub" id="src-lbl">RS PETROKIMIA GRESIK · 2026</div>
    </div>
  </div>
  <div class="topbar-right">
    <div class="pill"><div class="pill-dot"></div><span id="upd-lbl">Data Lokal</span></div>
    <button class="tbtn primary" onclick="refreshData()" id="refresh-btn">🔄 Refresh Data</button>
  </div>
</div>

<div class="tab-bar" id="tabs"></div>

<div class="main" id="main"></div>

<script>
// ══════════════════════════════════════════════════════════════════
// TABLE OF CONTENTS
// ══════════════════════════════════════════════════════════════════
// 1. CONFIGURATION
// 2. STATE MANAGEMENT
// 3. DATA PARSING & DETECTION
// 4. UI COMPONENT BUILDERS (Helper Functions)
// 5. FETCH & LIVE UPDATE
// 6. RENDER FUNCTIONS
// 7. TAB NAVIGATION
// 8. INITIALIZATION

// ══════════════════════════════════════════════════════════════════
// 1. CONFIGURATION
// ══════════════════════════════════════════════════════════════════
const GS_URL = 'https://script.google.com/macros/s/AKfycbw3obd6r4nhhXJDNu-anTwnYeG8Bzy7DQR5oWf4kyqm-Fpgzxj1CJNNEEeI-8LPKf0saQ/exec';

const SH = {
  OMZET:     'OMZET 2026',
  KUNJUNGAN: 'KUNJUNGAN 2026',
};

const MONTH_NUM = {
  JAN:1, FEB:2, MAR:3, APRIL:4, APR:4,
  MEI:5, JUNI:6, JUN:6, JULI:7, JUL:7,
  AGS:8, AGU:8, SEP:9, OKT:10, NOV:11, DES:12,
  JANUARI:1, FEBRUARI:2, MARET:3, APRIL:4,
  MEI:5, JUNI:6, JULI:7, AGUSTUS:8,
  SEPTEMBER:9, OKTOBER:10, NOVEMBER:11, DESEMBER:12
};

const BULAN_MAP = {
  JAN: 'JANUARI', JANUARI: 'JANUARI',
  FEB: 'FEBRUARI', FEBRUARI: 'FEBRUARI',
  MAR: 'MARET', MARET: 'MARET',
  APRIL: 'APRIL', APR: 'APRIL',
  MEI: 'MEI',
  JUNI: 'JUNI', JUN: 'JUNI',
  JULI: 'JULI', JUL: 'JULI',
  AGS: 'AGUSTUS', AGU: 'AGUSTUS', AGUSTUS: 'AGUSTUS',
  SEP: 'SEPTEMBER', SEPTEMBER: 'SEPTEMBER',
  OKT: 'OKTOBER', OKTOBER: 'OKTOBER',
  NOV: 'NOVEMBER', NOVEMBER: 'NOVEMBER',
  DES: 'DESEMBER', DESEMBER: 'DESEMBER'
};

const PAYERS = [
  {k:'petrokimia', l:'PT Petrokimia',   c:'#dc2626'},
  {k:'perusahaan', l:'Perusahaan Lain', c:'#2563eb'},
  {k:'bri',        l:'BRI (PG)',        c:'#f59e0b'},
  {k:'asuransi',   l:'Asuransi Lain',   c:'#7c3aed'},
  {k:'prokMurni',  l:'Prokespen Murni', c:'#0891b2'},
  {k:'prokBpjs',   l:'Prokespen BPJS',  c:'#059669'},
  {k:'bpjsKes',    l:'BPJS Kesehatan',  c:'#0d9488'},
  {k:'bpjsTK',     l:'BPJS TK',         c:'#ea580c'},
  {k:'umum',       l:'Umum',            c:'#4f46e5'},
];

// ══════════════════════════════════════════════════════════════════
// 2. STATE MANAGEMENT
// ══════════════════════════════════════════════════════════════════
const EMBEDDED = {}; // Dummy, akan diisi dari Sheets
const S = {
  data: { omzet: {}, kunjungan: {}, mcu: {} },
  tab: 'omzet',
  month: 'JANUARI',
  mcuMonth: 'JANUARI',
  charts: {},
  live: false,
  kumulatifLoaded: false,
  kumulatifTgl: 0,
};

// ══════════════════════════════════════════════════════════════════
// 3. DATA PARSING & DETECTION
// ══════════════════════════════════════════════════════════════════
function normalizeObjKeys(obj) {
  const normalized = {};
  Object.keys(obj).forEach(key => {
    const bulanLengkap = BULAN_MAP[key.toUpperCase()] || key;
    normalized[bulanLengkap] = obj[key];
  });
  return normalized;
}

// ══════════════════════════════════════════════════════════════════
// 4. UI COMPONENT BUILDERS (Helper Functions)
// ══════════════════════════════════════════════════════════════════

/**
 * Buat kartu KPI dengan tema warna
 * @param {string} icon - Emoji/icon
 * @param {string} title - Judul KPI
 * @param {string} value - Nilai utama
 * @param {string} subtitle - Sub teks
 * @param {string} colorKey - CSS var color (--kc) dan (--kbg)
 * @returns {string} HTML string
 */
function createKpiCard(icon, title, value, subtitle, colorKey = '') {
  const style = colorKey ? `style="--kc:${colorKey.split('|')[0]};--kbg:${colorKey.split('|')[1]}"` : '';
  return `<div class="kpi" ${style}>
    <div class="kpi-ico">${icon}</div>
    <div class="kpi-lbl">${title}</div>
    <div class="kpi-val">${value}</div>
    <div class="kpi-sub">${subtitle}</div>
  </div>`;
}

/**
 * Buat loading indicator
 * @returns {string} HTML string
 */
function createLoadingState() {
  return `<div class="loading-state">
    <div class="loading-spinner"></div>
    <div class="loading-text">Memuat data dari server...</div>
  </div>`;
}

/**
 * Buat empty state message
 * @param {string} message - Pesan yang ditampilkan
 * @returns {string} HTML string
 */
function createEmptyState(message) {
  return `<div class="empty-state">${message}</div>`;
}

/**
 * Format angka menjadi Rupiah
 * @param {number} v - Nilai
 * @returns {string} Format Rp
 */
function fmt(v) {
  if (!v) return 'Rp 0';
  const jt = v / 1e6;
  if (jt >= 1000) {
    return 'Rp ' + jt.toLocaleString('id-ID', {minimumFractionDigits:1, maximumFractionDigits:1}) + ' jt';
  }
  return 'Rp ' + jt.toFixed(1) + ' jt';
}

/**
 * Buat badge capaian berdasarkan persentase
 * @param {number} p - Persentase
 * @returns {string} HTML badge
 */
function createBadge(p) {
  if(p>=150) return `<span class="bp">${p}%</span>`;
  if(p>=100) return `<span class="bg">${p}%</span>`;
  if(p>=80)  return `<span class="by">${p}%</span>`;
  return `<span class="br">${p}%</span>`;
}

// ══════════════════════════════════════════════════════════════════
// 5. FETCH & LIVE UPDATE
// ══════════════════════════════════════════════════════════════════

async function connectGS() {
  const url = GS_URL.trim();
  if (!url) return;
  
  // Tampilkan loading state
  document.getElementById('main').innerHTML = createLoadingState();
  
  try {
    const res = await fetch(url + '?action=getSummary');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    if (json.error) throw new Error(json.error);
    
    const mn = json.currentMonth || 'JANUARI';
    if (json.omzetHarian?.length) S.data.omzet[mn] = json.omzetHarian;
    if (json.kunjunganHarian?.length) S.data.kunjungan[mn] = json.kunjunganHarian;
    if (json.allOmzet) Object.assign(S.data.omzet, json.allOmzet);
    if (json.allKunjungan) Object.assign(S.data.kunjungan, json.allKunjungan);
    if (json.allMcu) Object.assign(S.data.mcu, json.allMcu);
    
    const bulanOrder = ['JANUARI','FEBRUARI','MARET','APRIL','MEI','JUNI','JULI','AGUSTUS','SEPTEMBER','OKTOBER','NOVEMBER','DESEMBER'];
    const latestOmzet = Object.keys(S.data.omzet).sort((a,b) => bulanOrder.indexOf(a) - bulanOrder.indexOf(b));
    if (latestOmzet.length) S.month = latestOmzet[latestOmzet.length - 1];
    
    S.live = true;
    document.getElementById('upd-lbl').textContent = 'LIVE · ' + new Date().toLocaleTimeString('id-ID');
    document.getElementById('src-lbl').textContent = 'REALTIME · GOOGLE SHEETS · 2026';
    render();
  } catch(e) {
    console.warn('Sheets tidak terhubung:', e.message);
    document.getElementById('main').innerHTML = createEmptyState('⚠️ Gagal terhubung ke Google Sheets. Cek koneksi Anda.');
  }
}

async function refreshData() {
  if (!GS_URL.trim()) return;
  document.getElementById('refresh-btn').textContent = '⏳';
  await connectGS();
  document.getElementById('refresh-btn').textContent = '🔄 Refresh Data';
}

// ══════════════════════════════════════════════════════════════════
// 6. RENDER FUNCTIONS
// ══════════════════════════════════════════════════════════════════

function render() {
  destroyCharts();
  buildTabs();
  if (S.tab === 'omzet') renderOmzet();
  else if (S.tab === 'kunjungan') renderKunjungan();
  else if (S.tab === 'mcu') renderMcu();
  else renderLaporan();
}

function destroyCharts() {
  Object.values(S.charts).forEach(c => { try { c.destroy(); } catch(e){} });
  S.charts = {};
}

function renderOmzet() {
  const rows = S.data.omzet[S.month] || [];
  if (!rows.length) {
    document.getElementById('main').innerHTML = createEmptyState('Belum ada data untuk bulan ini');
    return;
  }

  const tot = rows.reduce((s,r) => s+r.total, 0);
  const dHit = rows.filter(r => r.pct >= 100).length;
  const best = rows.reduce((a,b) => b.pct>a.pct?b:a);
  const avgPct = Math.round(rows.reduce((s,r) => s+r.pct, 0) / rows.length);

  const payerHtml = PAYERS.map(p => {
    const t = rows.reduce((s,r) => s+(r[p.k]||0), 0);
    const sh = ((t/tot)*100).toFixed(1);
    return `<div style="padding:8px 0;border-bottom:1px solid var(--bd2)">
      <div style="font-size:11px;font-weight:500;color:var(--tx);margin-bottom:4px">${p.l}</div>
      <div style="display:flex;gap:8px;align-items:center">
        <div style="width:8px;height:8px;background:${p.c};border-radius:2px;flex-shrink:0"></div>
        <div style="flex:1;font-size:10px;color:var(--mu)">${fmt(t)}</div>
        <div style="font-size:10px;color:var(--tx2);font-weight:600">${sh}%</div>
      </div>
    </div>`;
  }).join('');

  const tblOmzet = rows.map(r=>`<tr>
    <td>${r.d}</td><td>${fmt(r.petrokimia)}</td><td>${fmt(r.perusahaan)}</td>
    <td>${fmt(r.bri)}</td><td>${fmt(r.asuransi)}</td><td>${fmt(r.prokMurni)}</td>
    <td>${fmt(r.prokBpjs)}</td><td>${fmt(r.bpjsKes)}</td><td>${fmt(r.bpjsTK)}</td>
    <td>${fmt(r.umum)}</td><td style="font-weight:600;color:var(--tx)">${fmt(r.total)}</td>
    <td style="color:var(--mu)">${r.target?fmt(r.target):'—'}</td>
    <td>${createBadge(r.pct)}</td>
  </tr>`).join('');

  const days = rows.map(r=>r.d);
  const gridColor = 'rgba(26,37,53,.06)';

  document.getElementById('main').innerHTML = `<div class="fadein">
    <div class="kpi-row">

      <div class="card">

        </div>
        <div>${payerHtml}</div>
      </div>
      <div class="card">
        <div class="card-head">
          <div class="card-t">Total Omzet Harian — ${S.month}</div>

      scales:{x:{grid:{color:gridColor}},y:{grid:{color:gridColor},min:0}}}

}

function renderKunjungan() {
  const rows = S.data.kunjungan[S.month] || [];
  if (!rows.length) {
    document.getElementById('main').innerHTML = createEmptyState('Belum ada data untuk bulan ini');
    return;
  }

  const totK = rows.reduce((s,r) => s+r.total, 0);
  const dHitK = rows.filter(r=>r.pct>=100).length;
  const bestK = rows.reduce((a,b)=>b.total>a.total?b:a);
  const avgK = Math.round(totK/rows.length);
  const totRJ = rows.reduce((s,r)=>s+r.rjTotal,0);
  const totRI = rows.reduce((s,r)=>s+r.riTotal,0);
  const totIGD = rows.reduce((s,r)=>s+r.igdTotal,0);
  const totMCU = rows.reduce((s,r)=>s+r.mcuTotal,0);

  const tblK = rows.map(r=>`<tr>
    <td>${r.d}</td><td>${r.rjTotal}</td><td>${r.riTotal}</td>
    <td>${r.igdTotal}</td><td>${r.mcuTotal}</td>
    <td style="font-weight:600;color:var(--tx)">${r.total}</td>
    <td style="color:var(--mu)">${r.target?Math.round(r.target):'—'}</td>
    <td>${createBadge(r.pct)}</td>
  </tr>`).join('');

  document.getElementById('main').innerHTML = `<div class="fadein">
    <div class="kpi-row">
      ${createKpiCard('👥', 'Total Kunjungan '+S.month, totK.toLocaleString('id-ID'), rows.length+' hari tercatat', '#0a9e87|#e6f7f4')}
      ${createKpiCard('📊', 'Avg per Hari', avgK, 'Pasien rata-rata harian', '#3b82f6|#eff6ff')}
      ${createKpiCard('✅', 'Hari Capai Target', dHitK+' hari', 'dari '+rows.length+' hari', '#f59e0b|#fef3c7')}
      ${createKpiCard('🏆', 'Kunjungan Terbanyak', bestK.total, 'Tgl '+bestK.d+' '+S.month, '#e11d48|#fff1f2')}
    </div>

    <div class="grid2">
      <div class="card fw">
        <div class="card-head">
          <div class="card-t">Total Kunjungan Harian — ${S.month}</div>
          <div class="card-s">Hijau = capai target · Biru = di bawah target</div>
        </div>
        <canvas id="cKDaily"></canvas>
      </div>
      <div class="card">
        <div class="card-head">
          <div class="card-t">Komposisi Unit Layanan</div>
          <div class="card-s">Rawat Jalan · Rawat Inap · IGD · MCU</div>
        </div>
        <canvas id="cKPie"></canvas>
      </div>
    </div>

    <div class="card">
      <div class="card-head">
        <div class="card-t">Detail Kunjungan Harian — ${S.month}</div>
        <div class="card-s">Per unit layanan</div>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr>
            <th>Tgl</th><th>Rawat Jalan</th><th>Rawat Inap</th>
            <th>IGD</th><th>MCU</th><th>Total</th><th>Target</th><th>Capaian</th>
          </tr></thead>
          <tbody>${tblK}</tbody>
        </table>
      </div>
    </div>
  </div>`;

  const days = rows.map(r=>r.d);
  const gridColor = 'rgba(26,37,53,.06)';

  S.charts.kd = new Chart(document.getElementById('cKDaily'),{
    data:{labels:days,datasets:[
      {type:'bar',label:'Total Kunjungan',
       data:rows.map(r=>r.total),
       backgroundColor:rows.map(r=>r.pct>=100?'rgba(10,158,135,.7)':'rgba(59,130,246,.55)'),
       borderColor:rows.map(r=>r.pct>=100?'#0a9e87':'#3b82f6'),
       borderWidth:1,borderRadius:5},
      {type:'line',label:'Target',data:rows.map(r=>r.target||null),
       borderColor:'#f59e0b',borderDash:[5,4],borderWidth:2,
       pointRadius:3,pointBackgroundColor:'#f59e0b',
       tension:.3,fill:false,spanGaps:true}
    ]},
    options:{responsive:true,interaction:{mode:'index'},
      plugins:{legend:{position:'top',labels:{padding:16}},tooltip:{backgroundColor:'#fff',titleColor:'#1a2535',bodyColor:'#3d5068',borderColor:'#dde4ee',borderWidth:1,padding:10}},
      scales:{x:{grid:{color:gridColor}},y:{grid:{color:gridColor},min:0}}}
  });

  S.charts.kp = new Chart(document.getElementById('cKPie'),{
    type:'doughnut',
    data:{labels:['Rawat Jalan','Rawat Inap','IGD','MCU'],
      datasets:[{data:[totRJ,totRI,totIGD,totMCU],
        backgroundColor:['rgba(59,130,246,.2)','rgba(139,92,246,.2)','rgba(225,29,72,.2)','rgba(245,158,11,.2)'],
        borderColor:['#3b82f6','#8b5cf6','#e11d48','#f59e0b'],
        borderWidth:2,hoverOffset:8}]},
    options:{responsive:true,cutout:'58%',
      plugins:{legend:{position:'bottom',labels:{padding:12}},
        tooltip:{backgroundColor:'#fff',titleColor:'#1a2535',bodyColor:'#3d5068',borderColor:'#dde4ee',borderWidth:1,padding:10,callbacks:{label:c=>` ${c.label}: ${c.raw.toLocaleString()} (${((c.raw/totK)*100).toFixed(1)}%)`}}}}
  });
}

// ══════════════════════════════════════════════════════════════════
// 7. TAB NAVIGATION
// ══════════════════════════════════════════════════════════════════

function buildTabs() {
  const el = document.getElementById('tabs');
  const bulanOrder = ['JANUARI','FEBRUARI','MARET','APRIL','MEI','JUNI','JULI','AGUSTUS','SEPTEMBER','OKTOBER','NOVEMBER','DESEMBER'];
  const sortBulan = (arr) => arr.sort((a,b) => bulanOrder.indexOf(a) - bulanOrder.indexOf(b));
  
  const omzetMs = sortBulan(Object.keys(S.data.omzet));
  const kunjMs = sortBulan(Object.keys(S.data.kunjungan));
  const mcuMs = sortBulan(Object.keys(S.data.mcu || {}));

  const activeMsList = S.tab === 'mcu' ? mcuMs : (S.tab === 'kunjungan' ? kunjMs : omzetMs);
  const activeMonth = S.tab === 'mcu' ? S.mcuMonth : S.month;
  const onchangeFn = S.tab === 'mcu'
    ? `onchange="setMcuMonth(this.value)"`
    : `onchange="setMonth('${S.tab}',this.value)"`;

  const monthDropdown = activeMsList.length > 0 && S.tab !== 'laporan'
    ? `<select class="month-select" ${onchangeFn} title="Pilih bulan">
        ${activeMsList.map(m => `<option value="${m}" ${activeMonth===m?'selected':''}>${m}</option>`).join('')}
       </select>`
    : '';

  let h = '';
  h += `<button class="tab ${S.tab==='omzet'?'active':''}" onclick="setTab('omzet')">💰 Omzet</button>`;
  if (S.tab === 'omzet' && monthDropdown) h += monthDropdown;
  h += '<div class="tab-divider"></div>';
  h += `<button class="tab ${S.tab==='kunjungan'?'active':''}" onclick="setTab('kunjungan')">👥 Kunjungan</button>`;
  if (S.tab === 'kunjungan' && monthDropdown) h += monthDropdown;
  h += '<div class="tab-divider"></div>';
  h += `<button class="tab ${S.tab==='mcu'?'active':''}" onclick="setTab('mcu')">🔬 Omzet MCU</button>`;
  if (S.tab === 'mcu' && monthDropdown) h += monthDropdown;
  h += '<div class="tab-divider"></div>';
  h += `<button class="tab ${S.tab==='laporan'?'active':''}" onclick="setTab('laporan')">📋 Laporan Harian</button>`;
  el.innerHTML = h;
}

function setTab(t) {
  S.tab = t;
  const bulanOrder = ['JANUARI','FEBRUARI','MARET','APRIL','MEI','JUNI','JULI','AGUSTUS','SEPTEMBER','OKTOBER','NOVEMBER','DESEMBER'];
  const sortBulan = (arr) => arr.sort((a,b) => bulanOrder.indexOf(a) - bulanOrder.indexOf(b));
  
  if (t === 'omzet' || t === 'kunjungan') {
    const ms = sortBulan(Object.keys(S.data[t]));
    if (!ms.includes(S.month)) S.month = ms[ms.length-1];
  } else if (t === 'mcu') {
    const ms = sortBulan(Object.keys(S.data.mcu || {}));
    if (!ms.includes(S.mcuMonth)) S.mcuMonth = ms[ms.length-1];
  }
  render();
}

function setMcuMonth(m) { S.tab = 'mcu'; S.mcuMonth = m; render(); }
function setMonth(t, m) { S.tab = t; S.month = m; render(); }
