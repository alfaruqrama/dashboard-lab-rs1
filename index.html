<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Kunjungan Lab RS Petrokimia Gresik</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:    #f0f4f8;
  --bg2:   #e6ecf3;
  --white: #ffffff;
  --s1:    #ffffff;
  --s2:    #f7f9fc;
  --bd:    #dde4ee;
  --bd2:   #c8d3e2;
  --ac:    #0a9e87;
  --ac-l:  #e6f7f4;
  --ac2:   #f04e37;
  --ac2-l: #fdecea;
  --ac3:   #f59e0b;
  --ac3-l: #fef3c7;
  --ac4:   #3b82f6;
  --ac4-l: #eff6ff;
  --ac5:   #8b5cf6;
  --tx:    #1a2535;
  --tx2:   #3d5068;
  --mu:    #7a8fa8;
  --shadow: 0 1px 3px rgba(26,37,53,.06), 0 4px 12px rgba(26,37,53,.06);
  --shadow-md: 0 2px 8px rgba(26,37,53,.08), 0 8px 24px rgba(26,37,53,.08);
  --r: 14px;
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--tx);
  min-height: 100vh;
  overflow-x: hidden;
}

/* subtle grid texture on background */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(10,158,135,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(10,158,135,.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none; z-index: 0;
}

/* ── TOPBAR ── */
.topbar {
  position: sticky; top: 0; z-index: 200;
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(16px) saturate(180%);
  border-bottom: 1px solid var(--bd);
  padding: 0 28px;
  height: 60px;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  box-shadow: 0 1px 0 var(--bd), 0 2px 16px rgba(26,37,53,.05);
}
.brand {
  display: flex; align-items: center; gap: 10px;
}
.brand-icon {
  width: 34px; height: 34px;
  background: linear-gradient(135deg, var(--ac), #06b6d4);
  border-radius: 9px;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px;
  box-shadow: 0 2px 8px rgba(10,158,135,.3);
  flex-shrink: 0;
}
.brand-text { line-height: 1.2; }
.brand-name {
  font-family: 'Fraunces', serif;
  font-size: 15px; font-weight: 700;
  color: var(--tx);
  letter-spacing: -.01em;
}
.brand-sub {
  font-size: 10px; color: var(--mu);
  font-family: 'DM Mono', monospace;
  letter-spacing: .04em;
}
.topbar-right {
  display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
}
.pill {
  display: flex; align-items: center; gap: 5px;
  background: var(--ac-l); border: 1px solid rgba(10,158,135,.2);
  padding: 5px 12px; border-radius: 100px;
  font-size: 10px; font-family: 'DM Mono', monospace;
  color: var(--ac); font-weight: 500;
}
.pill-dot {
  width: 6px; height: 6px; background: var(--ac); border-radius: 50%;
  animation: blink 2s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
.tbtn {
  background: var(--white); border: 1px solid var(--bd);
  border-radius: 9px; padding: 7px 16px;
  font-size: 12px; font-family: 'DM Sans', sans-serif;
  font-weight: 500; color: var(--tx2); cursor: pointer;
  transition: all .18s; box-shadow: var(--shadow);
}
.tbtn:hover { border-color: var(--ac); color: var(--ac); background: var(--ac-l); }
.tbtn.primary {
  background: var(--ac); color: #fff; border-color: var(--ac);
  box-shadow: 0 2px 8px rgba(10,158,135,.35);
}
.tbtn.primary:hover { opacity: .88; }

/* ── TABS ── */
.tab-bar {
  background: var(--white);
  border-bottom: 1px solid var(--bd);
  padding: 0 28px;
  display: flex; align-items: center; gap: 2px;
  overflow-x: auto; scrollbar-width: none;
  box-shadow: 0 1px 0 var(--bd);
  position: relative; z-index: 1;
}
.tab {
  padding: 14px 18px;
  border: none; background: transparent;
  font-size: 12px; font-weight: 500;
  color: var(--mu); cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all .18s; white-space: nowrap;
  font-family: 'DM Sans', sans-serif;
  letter-spacing: .01em;
}
.tab:hover { color: var(--tx2); }
.tab.active { color: var(--ac); border-bottom-color: var(--ac); font-weight: 600; }
.tab-divider {
  width: 1px; height: 18px; background: var(--bd);
  margin: 0 6px; flex-shrink: 0; align-self: center;
}

/* ── MONTH SELECT DROPDOWN ── */
.month-select {
  padding: 10px 14px;
  border: 1px solid var(--bd);
  border-radius: 10px;
  background: var(--white);
  color: var(--tx);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  transition: all .18s;
  box-shadow: var(--shadow);
  margin-left: 8px;
  height: 38px;
  min-width: 140px;
  appearance: none;
  background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%237a8fa8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
  background-repeat: no-repeat;
  background-position: right 8px center;
  background-size: 18px;
  padding-right: 32px;
}
.month-select:hover {
  border-color: var(--ac);
  box-shadow: 0 1px 3px rgba(10,158,135,.12), 0 4px 12px rgba(10,158,135,.08);
}
.month-select:focus {
  outline: none;
  border-color: var(--ac);
  color: var(--ac);
  box-shadow: 0 0 0 3px rgba(10,158,135,.08), 0 1px 3px rgba(10,158,135,.12), 0 4px 12px rgba(10,158,135,.08);
}
.month-select option {
  color: var(--tx);
  background: var(--white);
  padding: 8px 12px;
  border: none;
}
.month-select option:checked {
  background: linear-gradient(var(--ac-l), var(--ac-l));
  color: var(--ac);
  font-weight: 600;
}

/* ── MAIN ── */
.main { padding: 24px 28px; position: relative; z-index: 1; }

/* ── KPI CARDS ── */
.kpi-row {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 14px; margin-bottom: 20px;
}
.kpi {
  background: var(--white);
  border: 1px solid var(--bd);
  border-radius: var(--r);
  padding: 18px 20px;
  position: relative; overflow: hidden;
  transition: transform .2s, box-shadow .2s;
  box-shadow: var(--shadow);
}
.kpi:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.kpi::after {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: var(--kc, var(--ac));
  border-radius: var(--r) var(--r) 0 0;
}
.kpi-ico {
  position: absolute; top: 14px; right: 14px;
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--kbg, var(--ac-l));
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}
.kpi-lbl {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: .1em; color: var(--mu);
  font-family: 'DM Mono', monospace; margin-bottom: 8px;
}
.kpi-val {
  font-family: 'Fraunces', serif;
  font-size: clamp(18px, 2vw, 26px); font-weight: 700;
  color: var(--kc, var(--ac)); line-height: 1;
  letter-spacing: -.02em;
}
.kpi-sub { font-size: 11px; color: var(--mu); margin-top: 5px; }

/* ── SECTION CARDS ── */
.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.fw { grid-column: 1 / -1; }
.card {
  background: var(--white);
  border: 1px solid var(--bd);
  border-radius: var(--r);
  padding: 22px 24px;
  box-shadow: var(--shadow);
}
.card-head { margin-bottom: 16px; }
.card-t { font-size: 14px; font-weight: 600; color: var(--tx); }
.card-s { font-size: 11px; color: var(--mu); margin-top: 3px; }
canvas { max-height: 270px; }

/* ── PAYER GRID ── */
.payer-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
  gap: 10px; margin-bottom: 16px;
}
.pc {
  background: var(--white); border: 1px solid var(--bd);
  border-radius: 12px; padding: 14px 16px;
  transition: all .18s; box-shadow: var(--shadow);
  position: relative; overflow: hidden;
}
.pc::before {
  content: ''; position: absolute;
  bottom: 0; left: 0; right: 0; height: 2px;
  background: var(--pcc, var(--ac));
  transform: scaleX(0); transform-origin: left;
  transition: transform .25s;
}
.pc:hover::before { transform: scaleX(1); }
.pc:hover { border-color: var(--pcc, var(--ac)); box-shadow: var(--shadow-md); }
.pc-n { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: .1em; color: var(--mu); font-family: 'DM Mono', monospace; margin-bottom: 6px; }
.pc-v { font-size: 14px; font-weight: 700; color: var(--pcc, var(--ac)); font-family: 'Fraunces', serif; }
.pc-p { font-size: 10px; color: var(--mu); margin-top: 3px; }

/* ── TABLE ── */
.tbl-wrap { overflow-x: auto; margin-top: 4px; }
table { width: 100%; border-collapse: collapse; font-size: 11px; font-family: 'DM Mono', monospace; }
thead th {
  background: var(--s2); padding: 10px 14px;
  text-align: right; font-size: 9px; letter-spacing: .07em;
  color: var(--mu); text-transform: uppercase; white-space: nowrap;
  border-bottom: 1px solid var(--bd); font-weight: 600;
}
thead th:first-child { text-align: center; border-radius: 8px 0 0 0; }
thead th:last-child { border-radius: 0 8px 0 0; }
tbody tr { border-bottom: 1px solid var(--bd); transition: background .1s; }
tbody tr:hover { background: var(--s2); }
tbody tr:last-child { border-bottom: none; }
tbody td { padding: 9px 14px; text-align: right; white-space: nowrap; color: var(--tx2); }
tbody td:first-child { text-align: center; font-weight: 700; color: var(--ac); }

/* badges */
.bg { display:inline-block; padding:2px 9px; border-radius:100px; font-size:9px; font-weight:700; background:rgba(10,158,135,.12); color:var(--ac); border:1px solid rgba(10,158,135,.2); }
.br { display:inline-block; padding:2px 9px; border-radius:100px; font-size:9px; font-weight:700; background:var(--ac2-l); color:var(--ac2); border:1px solid rgba(240,78,55,.2); }
.by { display:inline-block; padding:2px 9px; border-radius:100px; font-size:9px; font-weight:700; background:var(--ac3-l); color:var(--ac3); border:1px solid rgba(245,158,11,.2); }
.bp { display:inline-block; padding:2px 9px; border-radius:100px; font-size:9px; font-weight:700; background:#f3f0ff; color:var(--ac5); border:1px solid rgba(139,92,246,.2); }

/* ── KUNJUNGAN UNIT CARDS ── */
.k-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px,1fr)); gap: 10px; margin-bottom: 16px; }
.kc {
  background: var(--white); border: 1px solid var(--bd);
  border-radius: 12px; padding: 16px; text-align: center;
  transition: all .18s; box-shadow: var(--shadow);
}
.kc:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
.kc-ico { font-size: 22px; margin-bottom: 8px; }
.kc-lbl { font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: .1em; color: var(--mu); font-family: 'DM Mono', monospace; margin-bottom: 6px; }
.kc-val { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 700; color: var(--kcc, var(--ac)); line-height: 1; }
.kc-pct { font-size: 10px; color: var(--mu); margin-top: 4px; }

/* ── CONNECT MODAL ── */
#modal {
  display: none; position: fixed; inset: 0; z-index: 500;
  background: rgba(26,37,53,.45);
  backdrop-filter: blur(6px);
  align-items: center; justify-content: center; padding: 20px;
}
#modal.open { display: flex; }
.modal-box {
  background: var(--white); border: 1px solid var(--bd);
  border-radius: 20px; padding: 36px; max-width: 520px; width: 100%;
  box-shadow: 0 20px 60px rgba(26,37,53,.2);
  animation: slideUp .25s ease;
}
@keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: none; opacity: 1; } }
.modal-box h2 { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 700; color: var(--tx); margin-bottom: 6px; }
.modal-box h2 span { color: var(--ac); }
.modal-box p { font-size: 12px; color: var(--mu); margin-bottom: 20px; line-height: 1.7; }
.steps { background: var(--s2); border: 1px solid var(--bd); border-radius: 10px; padding: 16px; margin-bottom: 16px; }
.step { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 10px; font-size: 12px; color: var(--tx2); line-height: 1.6; }
.step:last-child { margin-bottom: 0; }
.step-n { width: 20px; height: 20px; background: var(--ac); color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; margin-top: 1px; }
.step b { color: var(--tx); }
.modal-input-row { display: flex; gap: 8px; margin-bottom: 8px; }
.modal-input {
  flex: 1; background: var(--s2); border: 1px solid var(--bd);
  border-radius: 9px; padding: 11px 14px; color: var(--tx);
  font-family: 'DM Mono', monospace; font-size: 11px; outline: none;
  transition: border-color .18s;
}
.modal-input:focus { border-color: var(--ac); box-shadow: 0 0 0 3px var(--ac-l); }
.modal-err { color: var(--ac2); font-size: 11px; display: none; margin-bottom: 8px; }

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  .grid2 { grid-template-columns: 1fr; }
  .fw { grid-column: 1; }
  .topbar, .tab-bar, .main { padding-left: 16px; padding-right: 16px; }
  .brand-name { font-size: 13px; }
}

/* ── ANIMATIONS ── */
.fadein { animation: fadein .4s ease both; }
@keyframes fadein { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
.kpi { animation: fadein .35s ease both; }
.kpi:nth-child(1){animation-delay:.05s}
.kpi:nth-child(2){animation-delay:.1s}
.kpi:nth-child(3){animation-delay:.15s}
.kpi:nth-child(4){animation-delay:.2s}
.kpi:nth-child(5){animation-delay:.25s}

/* ── FORM LAPORAN HARIAN ── */
.form-wrap { max-width: 860px; margin: 0 auto; padding: 28px 28px 80px; }
.form-hero {
  background: linear-gradient(135deg, #0f172a 0%, #0d9e84 100%);
  border-radius: 18px; padding: 28px 28px 24px;
  margin-bottom: 20px; color: #fff; position: relative; overflow: hidden;
}
.form-hero::before {
  content: ''; position: absolute; inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='30' height='30' viewBox='0 0 30 30' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.04'%3E%3Ccircle cx='15' cy='15' r='1'/%3E%3C/g%3E%3C/svg%3E");
}
.form-hero h2 { font-family:'Fraunces',serif; font-size:20px; font-weight:700; margin-bottom:4px; position:relative; }
.form-hero p  { font-size:12px; opacity:.75; position:relative; }
.form-date-row { display:flex; gap:10px; align-items:center; margin-top:14px; position:relative; flex-wrap:wrap; }
.form-date-input {
  background:rgba(255,255,255,.15); border:1px solid rgba(255,255,255,.3);
  border-radius:9px; padding:8px 14px; color:#fff; font-size:13px;
  font-family:'DM Mono',monospace; outline:none;
}
.form-date-input:focus { background:rgba(255,255,255,.22); }
.form-date-input option { color:#1e293b; background:#fff; }

.target-bar {
  background:linear-gradient(135deg,var(--ac-l),var(--blue-l));
  border:1px solid rgba(13,158,132,.2); border-radius:12px;
  padding:14px 18px; margin-bottom:14px;
  display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end;
}
.target-item { display:flex; flex-direction:column; gap:4px; flex:1; min-width:130px; }
.target-item label { font-size:10px; color:var(--mu); font-family:'DM Mono',monospace; font-weight:600; text-transform:uppercase; letter-spacing:.06em; }
.target-val {
  background:var(--white); border:1px solid var(--bd); border-radius:7px;
  padding:7px 10px; font-size:12px; font-family:'DM Mono',monospace;
  font-weight:700; color:var(--tx); text-align:right; outline:none; width:100%;
  transition: border-color .18s;
}
.target-val:focus { border-color:var(--ac); }

.form-section {
  background:var(--white); border:1px solid var(--bd);
  border-radius:14px; margin-bottom:12px; box-shadow:var(--sh); overflow:hidden;
}
.fsec-head {
  display:flex; align-items:center; gap:10px;
  padding:12px 18px; background:var(--bg); border-bottom:1px solid var(--bd);
  cursor:pointer; user-select:none;
}
.fsec-icon { width:28px; height:28px; border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:14px; flex-shrink:0; }
.fsec-title { font-size:13px; font-weight:700; flex:1; }
.fsec-arr { color:var(--mu); font-size:11px; transition:.2s; }
.fsec-head.closed .fsec-arr { transform:rotate(-90deg); }
.fsec-body { padding:16px 18px; }
.fsec-body.hidden { display:none; }

.fgrid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.fgrid3 { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
.fcol { display:flex; flex-direction:column; gap:4px; }
.fcol label { font-size:11px; font-weight:600; color:var(--tx2); font-family:'DM Mono',monospace; }
.fcol label .sub { font-weight:400; color:var(--mu); }
.finput {
  background:var(--bg); border:1px solid var(--bd); border-radius:8px;
  padding:9px 12px; font-size:15px; font-weight:700; color:var(--tx);
  font-family:'DM Mono',monospace; outline:none; text-align:right; width:100%;
  transition:border-color .18s, box-shadow .18s;
}
.finput:focus { border-color:var(--ac); background:var(--white); box-shadow:0 0 0 3px rgba(13,158,132,.12); }
.finput.auto { background:linear-gradient(135deg,#e8f8f5,#eff6ff); border-color:rgba(13,158,132,.3); color:var(--ac-d); pointer-events:none; font-size:13px; }
.finput.rp { font-size:12px; }
.fhr { grid-column:1/-1; border:none; border-top:1px dashed var(--bd); margin:2px 0; }
.ffull { grid-column:1/-1; }

.preview-wrap { background:#1e293b; border-radius:16px; margin-top:20px; box-shadow:var(--sh2); overflow:hidden; }
.preview-head {
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 18px; background:#0f172a; border-bottom:1px solid rgba(255,255,255,.08);
}
.preview-head span { font-size:11px; color:#64748b; font-family:'DM Mono',monospace; }
.preview-acts { display:flex; gap:8px; }
.btn-copy, .btn-wa {
  display:flex; align-items:center; gap:5px; padding:7px 14px; border-radius:7px;
  border:none; font-size:12px; font-weight:600; cursor:pointer; transition:.18s;
  font-family:'DM Sans',sans-serif;
}
.btn-copy { background:rgba(255,255,255,.08); color:#94a3b8; }
.btn-copy:hover { background:rgba(255,255,255,.15); color:#fff; }
.btn-wa { background:#25d366; color:#fff; }
.btn-wa:hover { background:#1aa64b; }
.btn-reset { background:rgba(239,68,68,.15); color:#f87171; }
.btn-reset:hover { background:rgba(239,68,68,.25); }
.preview-text {
  padding:20px; font-family:'DM Mono',monospace; font-size:12px;
  line-height:2; color:#e2e8f0; white-space:pre; overflow-x:auto;
  max-height:560px; overflow-y:auto;
}
.toast {
  position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
  background:var(--ac); color:#fff; padding:10px 26px; border-radius:100px;
  font-size:13px; font-weight:600; z-index:9999;
  opacity:0; transition:.3s; pointer-events:none; white-space:nowrap;
  box-shadow:0 4px 20px rgba(13,158,132,.4);
}
.toast.show { opacity:1; }
.promo-row { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
.promo-num {
  width:22px; height:22px; background:#f5f3ff; color:#8b5cf6;
  border-radius:6px; font-size:11px; font-weight:700; font-family:'DM Mono',monospace;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
}
.promo-name-input {
  flex:1; background:var(--bg); border:1px solid var(--bd); border-radius:8px;
  padding:8px 12px; font-size:13px; color:var(--tx); outline:none;

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f5f3;--surface:#fff;--border:#e2e2de;--bs:#c4c4be;
  --text:#181816;--muted:#88887f;--acc:#1a6b45;--acl:#edf7f2;--acm:#4caf80;
  --danger:#c0392b;--dl:#fdf3f2;--warn:#d97706;--wl:#fffbf0;
  --mono:'DM Mono',monospace;--sans:'Sora',sans-serif;
  --r:6px;--sh:0 1px 2px rgba(0,0,0,.05),0 4px 16px rgba(0,0,0,.04);
}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;height:40px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.hd-l{display:flex;align-items:center;gap:8px}
.logo{width:22px;height:22px;background:var(--acc);border-radius:4px;display:flex;align-items:center;justify-content:center}
.logo svg{width:12px;height:12px;fill:white}
.hn{font-size:11.5px;font-weight:600;letter-spacing:-.01em}
.hs{font-size:9.5px;color:var(--muted);font-family:var(--mono)}
.hd-r{display:flex;align-items:center;gap:6px}
.bdg{font-size:9.5px;font-family:var(--mono);color:var(--muted);background:var(--bg);border:1px solid var(--border);padding:2px 8px;border-radius:20px}
.bexp{display:flex;align-items:center;gap:4px;padding:3px 10px;background:var(--acc);color:white;border:none;border-radius:4px;font-size:10.5px;font-weight:500;font-family:var(--sans);cursor:pointer;transition:background .15s}
.bexp:hover{background:#145535}
.bexp svg{width:12px;height:12px;fill:white}

main{max-width:1400px;margin:0 auto;padding:10px 15px 60px}

.meta{display:inline-grid;grid-template-columns:140px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:6px 12px;margin-bottom:10px;box-shadow:var(--sh)}
.fg{display:flex;flex-direction:column;gap:2px}
.fl{font-size:8.5px;font-weight:600;color:var(--muted);font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em}
.fi{padding:4px 6px;border:1px solid var(--border);border-radius:4px;font-size:11px;font-family:var(--sans);color:var(--text);background:var(--surface);outline:none;height:28px}
.fi:focus{border-color:var(--acc)}

.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:6px 10px;box-shadow:var(--sh)}
.sl{font-size:8.5px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.sv{font-size:15px;font-weight:600;font-family:var(--mono);letter-spacing:-.02em}
.sv.g{color:var(--acc)}

.kh-wrap .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh);overflow:visible;margin-bottom:12px}
.ch{padding:6px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:#fafafa}
.ct{font-size:11px;font-weight:600;display:flex;align-items:center;gap:6px}
.rc{font-size:9.5px;font-family:var(--mono);color:var(--muted)}
.tw{overflow-x:auto}

table{width:100%;border-collapse:collapse;font-size:10.5px}
thead th{background:var(--bg);padding:4px 6px;font-size:8.5px;font-family:var(--mono);font-weight:500;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap;text-transform:uppercase;letter-spacing:.03em;text-align:center}
thead th.thl{text-align:left}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:hover{background:#f9f9f7}
tbody td{padding:2px 4px;vertical-align:middle;text-align:center}
tbody td.tdl{text-align:left}
tbody td.tdn{font-family:var(--mono);font-size:9px;color:var(--muted);width:26px}

.pw{position:relative;display:flex;align-items:center;gap:3px;flex-wrap:wrap}
.tpi{flex:1;padding:2px 5px;border:1px solid transparent;border-radius:4px;font-size:10.5px;font-family:var(--sans);color:var(--text);background:transparent;outline:none;min-width:180px;transition:all .15s}
.tpi:focus{border-color:var(--acc);background:var(--acl)}
.tpi.fx{font-weight:500;cursor:default}
.tpi.inv{border-color:var(--danger)!important;background:var(--dl)!important;color:var(--danger)}

.tnum, .tcur { -moz-appearance: textfield; }

.tnum{width:44px;padding:2px 3px;font-size:10.5px;border-radius:4px;background:transparent;border:1px solid transparent;text-align:center;font-family:var(--mono);outline:none}

async function connectGS() {
  const url = GS_URL.trim();
  if (!url) return;
  try {
    const res  = await fetch(url + '?action=getSummary');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    if (json.error) throw new Error(json.error);
    
    // ✅ NORMALIZE bulan dari singkat ke lengkap
    const mn = BULAN_MAP[json.currentMonth?.toUpperCase()] || json.currentMonth || 'MARET';
    
    // Update bulan aktif dari Sheets
    if (json.omzetHarian?.length)      S.data.omzet[mn]     = json.omzetHarian;
    if (json.kunjunganHarian?.length)  S.data.kunjungan[mn] = json.kunjunganHarian;
    
    // ✅ Normalize keys sebelum merge (JAN→JANUARI, FEB→FEBRUARI, dst)
    if (json.allOmzet)      Object.assign(S.data.omzet,     normalizeObjKeys(json.allOmzet));
    if (json.allKunjungan)  Object.assign(S.data.kunjungan, normalizeObjKeys(json.allKunjungan));
    if (json.allMcu)        Object.assign(S.data.mcu,       normalizeObjKeys(json.allMcu));
    
    // ✅ Selalu pindah ke bulan terbaru setelah data masuk (SORTED)
    const bulanOrder = ['JANUARI','FEBRUARI','MARET','APRIL','MEI','JUNI','JULI','AGUSTUS','SEPTEMBER','OKTOBER','NOVEMBER','DESEMBER'];
    const latestOmzet = Object.keys(S.data.omzet).sort((a,b) => bulanOrder.indexOf(a) - bulanOrder.indexOf(b));
    if (latestOmzet.length) S.month = latestOmzet[latestOmzet.length - 1];
    
    S.live = true;
    document.getElementById('upd-lbl').textContent = 'LIVE · ' + new Date().toLocaleTimeString('id-ID');
    document.getElementById('src-lbl').textContent = 'REALTIME · GOOGLE SHEETS · 2026';
    render();
    // Juga fetch kumulatif untuk form laporan
    fetchKumulatif(url);
  } catch(e) {
    console.warn('Sheets tidak terhubung:', e.message);
    render();
  }
}

async function fetchKumulatif(url) {
  if (!url) url = GS_URL.trim();
  if (!url) return;
  try {
    const res  = await fetch(url + '?action=getKumulatif');
    if (!res.ok) return;
    const json = await res.json();
    if (json.error) { console.warn('Kumulatif error:', json.error); return; }
    // Auto-isi form state
    if (json.kumOmzet  > 0) F.kumul_omzet          = json.kumOmzet;
    if (json.kumKunj   > 0) F.kumul_kunj            = json.kumKunj;
    if (json.targetOmzetHarian > 0) F.target_omzet_harian = json.targetOmzetHarian;
    if (json.targetKunjHarian  > 0) F.target_kunj_harian  = json.targetKunjHarian;
    if (json.targetOmzetBulan  > 0) F.target_omzet_bulan  = json.targetOmzetBulan;
    if (json.targetKunjBulan   > 0) F.target_kunj_bulan   = json.targetKunjBulan;
    S.kumulatifLoaded = true;
    S.kumulatifTgl    = json.tglAkhir || 0;
    // Jika sedang di tab laporan, re-render
    if (S.tab === 'laporan') renderLaporan();
  } catch(e) {
    console.warn('Kumulatif fetch error:', e.message);
  }
}

  if (!GS_URL.trim()) return;

}

// Hari dalam bahasa Indonesia
const HARI_ID = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];
const BULAN_ID = ['Januari','Februari','Maret','April','Mei','Juni','Juli','Agustus','September','Oktober','November','Desember'];

function fmtRp(n) {
  if (!n || isNaN(n)) return '0';
  return Math.round(n).toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
}
function parseRp(s) {
  return parseInt(String(s).replace(/[^0-9]/g,'')) || 0;
}
function pct(val, total) {
  if (!total) return 0;
  return Math.round(val / total * 100);
}
function getTglStr() {
  const d = new Date(F.tanggal + 'T00:00:00');
  const hari = HARI_ID[d.getDay()];
  const tgl  = d.getDate();
  const bln  = BULAN_ID[d.getMonth()];
  const thn  = d.getFullYear();
  return `${hari}, ${tgl < 10 ? '0'+tgl : tgl} ${bln} ${thn}`;
}
function getTglAkhir() {
  // Kalau sudah dimuat dari Sheets, pakai tgl terakhir yang ada data
  if (S.kumulatifLoaded && S.kumulatifTgl > 0) return S.kumulatifTgl;
  // Fallback: pakai tanggal yang dipilih di form
  const d = new Date(F.tanggal + 'T00:00:00');
  return d.getDate();
}
function getBulanStr() {
  const d = new Date(F.tanggal + 'T00:00:00');
  return BULAN_ID[d.getMonth()] + ' ' + d.getFullYear();
}

function setF(key, val) {
  if (['pend_mcu','pend_non_mcu','target_omzet_harian','target_omzet_bulan','kumul_omzet'].includes(key)) {
    F[key] = parseRp(val);
  } else if (['tanggal'].includes(key)) {
    F[key] = val;
  } else {
    F[key] = parseInt(val) || 0;
  }
  updatePreview();
}

  if (F.promoList.length <= 1) { showToast('Minimal 1 paket promo'); return; }
  F.promoList.splice(i, 1);
  F.promoVals.splice(i, 1);
  renderLaporan();
  const body = document.getElementById('sec-promo');
  const head = document.getElementById('head-promo');
  if (body) body.classList.remove('hidden');
  if (head) head.classList.remove('closed');
}

function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) { t = document.createElement('div'); t.id='toast'; t.className='toast'; document.body.appendChild(t); }
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function inp(key, label, subLabel, cls='', placeholder='0') {
  const val = F[key] || 0;
  const displayVal = cls.includes('rp') ? fmtRp(val) : val;
  return `<div class="fcol">
    <label>${label}${subLabel?` <span class="sub">${subLabel}</span>`:''}
    </label>
    <input class="finput${cls?' '+cls:''}" value="${displayVal}" placeholder="${placeholder}"
      oninput="setF('${key}',this.value)" inputmode="${cls.includes('rp')?'numeric':'numeric'}">
  </div>`;
}

function inpAuto(id, label) {
  return `<div class="fcol">
    <label>${label}</label>
    <input class="finput auto" id="${id}" value="0" readonly>
  </div>`;
}

// OMZET MCU HARIAN
// ══════════════════════════════════════════════
function renderMcu() {
  const el = document.getElementById('main');
  const mcuData = S.data.mcu || {};
  const bulanOrder = ['JANUARI','FEBRUARI','MARET','APRIL','MEI','JUNI','JULI','AGUSTUS','SEPTEMBER','OKTOBER','NOVEMBER','DESEMBER'];
  const months  = Object.keys(mcuData).sort((a,b) => bulanOrder.indexOf(a) - bulanOrder.indexOf(b));
  const mn      = S.mcuMonth || months[months.length-1];
  const rows    = (mcuData[mn] || []).filter(r => r.omzet > 0);

  if (!rows.length) {
    el.innerHTML = `<div class="main"><div style="text-align:center;padding:60px 20px;color:var(--mu)">
      <div style="font-size:40px;margin-bottom:12px">🔬</div>
      <div style="font-size:16px;font-weight:600">Belum ada data MCU untuk ${mn}</div>
    </div></div>`;
    return;
  }

  const total   = rows.reduce((s,r) => s + r.omzet, 0);
  const avg     = total / rows.length;
  const maxRow  = rows.reduce((a,b) => b.omzet > a.omzet ? b : a);
  const minRow  = rows.reduce((a,b) => b.omzet < a.omzet ? b : a);

  // Compare months for KPI
  const prevMonths = months.filter(m => m !== mn);
  const prevMn  = prevMonths[prevMonths.length-1];
  const prevRows = prevMn ? (mcuData[prevMn]||[]).filter(r=>r.omzet>0) : [];
  const prevTotal = prevRows.reduce((s,r)=>s+r.omzet,0);
  const growthPct = prevTotal > 0 ? ((total-prevTotal)/prevTotal*100).toFixed(1) : null;

  const fmtM = v => {
    const jt = v/1e6;
    if (jt >= 1000) return 'Rp ' + jt.toLocaleString('id-ID',{minimumFractionDigits:1,maximumFractionDigits:1}) + ' jt';
    return 'Rp ' + jt.toFixed(1) + ' jt';
  };
  const fmtFull = v => 'Rp ' + Math.round(v).toLocaleString('id-ID');

  const DAYS = ['Min','Sen','Sel','Rab','Kam','Jum','Sab'];
  const MONTH_IDX = {
    // Singkat (legacy)
    JAN:0,FEB:1,MAR:2,APR:3,MEI:4,JUN:5,JUL:6,AGS:7,SEP:8,OKT:9,NOV:10,DES:11,
    // Lengkap (baru)
    JANUARI:0,FEBRUARI:1,MARET:2,APRIL:3,MEI:4,JUNI:5,JULI:6,AGUSTUS:7,SEPTEMBER:8,OKTOBER:9,NOVEMBER:10,DESEMBER:11
  };
  const mIdx = MONTH_IDX[mn] ?? 0;
  const getDow = d => { const dt = new Date(2026, mIdx, d); return DAYS[dt.getDay()]; };

  const gridColor = '#e8edf4';
  const labels = rows.map(r => `${getDow(r.d)} ${r.d}`);
  const values = rows.map(r => r.omzet);

  // Bar colors: green if >= avg, orange below
  const barColors = values.map(v => v >= avg ? 'rgba(13,158,132,0.75)' : 'rgba(245,158,11,0.65)');
  const barBorders = values.map(v => v >= avg ? '#0a9e87' : '#f59e0b');

  // Table rows
  const tableRows = rows.map(r => `
    <tr>
      <td style="font-weight:600;color:var(--mu)">${getDow(r.d)} ${r.d}</td>
      <td style="font-weight:700;color:var(--tx);text-align:right">${fmtFull(r.omzet)}</td>
      <td style="text-align:right">
        <div style="display:flex;align-items:center;gap:6px;justify-content:flex-end">
          <div style="width:80px;height:6px;background:var(--bd);border-radius:3px;overflow:hidden">
            <div style="width:${Math.min(100,r.omzet/maxRow.omzet*100).toFixed(0)}%;height:100%;background:${r.omzet>=avg?'var(--ac)':'#f59e0b'};border-radius:3px"></div>
          </div>
          <span style="font-size:11px;color:var(--mu);font-family:'DM Mono',monospace;min-width:36px;text-align:right">
            ${(r.omzet/total*100).toFixed(1)}%
          </span>
        </div>
      </td>
    </tr>`).join('');

  el.innerHTML = `<div class="main fadein">
    <!-- KPI row -->
    <div class="kpi-row">
      <div class="kpi" style="--kc:#0a9e87;--kbg:#e6f7f4">
        <div class="kpi-ico">🔬</div>
        <div class="kpi-lbl">Total Omzet MCU ${mn}</div>
        <div class="kpi-val">${fmtM(total)}</div>
        <div class="kpi-sub">${rows.length} hari tercatat</div>
      </div>
      <div class="kpi" style="--kc:#3b82f6;--kbg:#eff6ff">
        <div class="kpi-ico">📊</div>
        <div class="kpi-lbl">Rata-rata / Hari</div>
        <div class="kpi-val">${fmtM(avg)}</div>
        <div class="kpi-sub">per hari aktif</div>
      </div>
      <div class="kpi" style="--kc:#f59e0b;--kbg:#fef3c7">
        <div class="kpi-ico">🏆</div>
        <div class="kpi-lbl">Tertinggi</div>
        <div class="kpi-val">${fmtM(maxRow.omzet)}</div>
        <div class="kpi-sub">Tgl ${maxRow.d} ${mn}</div>
      </div>
      <div class="kpi" style="--kc:#e11d48;--kbg:#fff1f2">
        <div class="kpi-ico">📉</div>
        <div class="kpi-lbl">Terendah</div>
        <div class="kpi-val">${fmtM(minRow.omzet)}</div>
        <div class="kpi-sub">Tgl ${minRow.d} ${mn}</div>
      </div>
      ${growthPct !== null ? `
      <div class="kpi" style="--kc:${parseFloat(growthPct)>=0?'#0a9e87':'#e11d48'};--kbg:${parseFloat(growthPct)>=0?'#e6f7f4':'#fff1f2'}">
        <div class="kpi-ico">${parseFloat(growthPct)>=0?'📈':'📉'}</div>
        <div class="kpi-lbl">vs ${prevMn}</div>
        <div class="kpi-val">${parseFloat(growthPct)>=0?'+':''}${growthPct}%</div>
        <div class="kpi-sub">${fmtM(prevTotal)} bulan lalu</div>
      </div>` : ''}
    </div>

    <!-- Chart -->
    <div class="card fadein" style="padding:20px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px">
        <div>
          <div style="font-size:14px;font-weight:700">Omzet MCU Harian — ${mn} 2026</div>
          <div style="font-size:11px;color:var(--mu);margin-top:2px">
            <span style="display:inline-block;width:10px;height:10px;background:#0a9e87;border-radius:2px;margin-right:4px"></span>≥ rata-rata &nbsp;
            <span style="display:inline-block;width:10px;height:10px;background:#f59e0b;border-radius:2px;margin-right:4px"></span>di bawah rata-rata
          </div>
        </div>
        <div style="font-size:11px;color:var(--mu);font-family:'DM Mono',monospace">
          Rata-rata: ${fmtFull(avg)}
        </div>
      </div>
      <div style="height:260px"><canvas id="chart-mcu-bar"></canvas></div>
    </div>

    <!-- Table -->
    <div class="card fadein" style="padding:20px">
      <div style="font-size:14px;font-weight:700;margin-bottom:14px">📋 Detail Harian MCU — ${mn} 2026</div>
      <div style="overflow-x:auto">
        <table style="width:100%;border-collapse:collapse;font-size:13px">
          <thead>
            <tr style="border-bottom:2px solid var(--bd)">
              <th style="padding:8px 12px;text-align:left;color:var(--mu);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.05em">Tgl</th>
              <th style="padding:8px 12px;text-align:right;color:var(--mu);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.05em">Omzet MCU</th>
              <th style="padding:8px 12px;text-align:right;color:var(--mu);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.05em">Kontribusi</th>
            </tr>
          </thead>
          <tbody>${tableRows}</tbody>
          <tfoot>
            <tr style="border-top:2px solid var(--bd);background:var(--bg)">
              <td style="padding:10px 12px;font-weight:700">TOTAL</td>
              <td style="padding:10px 12px;text-align:right;font-weight:800;color:var(--ac)">${fmtFull(total)}</td>
              <td style="padding:10px 12px;text-align:right;font-weight:600;color:var(--mu)">100%</td>
            </tr>
          </tfoot>
        </table>
      </div>
    </div>
  </div>`;

  // Render chart after DOM
  requestAnimationFrame(() => {
    const ctx = document.getElementById('chart-mcu-bar');
    if (!ctx) return;
    const chartId = 'mcu-bar';
    S.charts[chartId] = new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          label: 'Omzet MCU',
          data: values,
          backgroundColor: barColors,
          borderColor: barBorders,
          borderWidth: 1.5,
          borderRadius: 4,
        }, {
          label: 'Rata-rata',
          data: new Array(values.length).fill(avg),
          type: 'line',
          borderColor: '#e11d48',
          borderWidth: 1.5,
          borderDash: [5,4],
          pointRadius: 0,
          fill: false,
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        interaction: { mode:'index', intersect:false },
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => {
                if (ctx.dataset.label === 'Rata-rata') return ' Rata-rata: ' + fmtFull(ctx.parsed.y);
                return ' Omzet MCU: ' + fmtFull(ctx.parsed.y);
              }
            }
          }
        },
        scales: {
          x: { grid:{display:false}, ticks:{font:{size:10}, maxRotation:45} },
          y: {
            grid:{color:gridColor},
            ticks:{
              callback: v => {
                const jt = v/1e6;
                if (jt >= 1000) return 'Rp ' + (jt/1000).toFixed(1) + ' M';
                return 'Rp ' + jt.toFixed(0) + ' jt';
              },
              font:{size:10}
            }
          }
        }
      }
    });
  });
}

// RENDER

function destroyCharts() {
  Object.values(S.charts).forEach(c => { try { c.destroy(); } catch(e){} });
  S.charts = {};
}

function render() {
  destroyCharts();
  buildTabs();
  if (S.tab === 'omzet') renderOmzet();
  else if (S.tab === 'kunjungan') renderKunjungan();
  else if (S.tab === 'mcu') renderMcu();
  else if (S.tab === 'kunjHarian') renderKunjHarian();
  else renderLaporan();
}

function buildTabs() {
  const el = document.getElementById('tabs');
  // ✅ SORT bulan sesuai urutan (JANUARI-DESEMBER)
  const bulanOrder = ['JANUARI','FEBRUARI','MARET','APRIL','MEI','JUNI','JULI','AGUSTUS','SEPTEMBER','OKTOBER','NOVEMBER','DESEMBER'];
  const sortBulan = (arr) => arr.sort((a,b) => bulanOrder.indexOf(a) - bulanOrder.indexOf(b));
  
  const omzetMs = sortBulan(Object.keys(S.data.omzet));
  const kunjMs  = sortBulan(Object.keys(S.data.kunjungan));
  const mcuMs   = sortBulan(Object.keys(S.data.mcu || {}));

  // ✅ Gabung semua bulan dari ketiga tab
  const allMonths = Array.from(new Set([...omzetMs, ...kunjMs, ...mcuMs])).sort((a,b) => bulanOrder.indexOf(a) - bulanOrder.indexOf(b));
  
  // ✅ Gunakan S.month untuk semua tab
  const currentMonth = S.month;

  const monthDropdown = allMonths.length > 0
    ? `<select class="month-select" onchange="setMonth(this.value)" title="Pilih bulan">
        ${allMonths.map(m => `<option value="${m}" ${currentMonth===m?'selected':''}>${m}</option>`).join('')}
       </select>`
    : '';

  let h = '';
  // ✅ Dropdown paling kiri
  if (monthDropdown) h += monthDropdown;
  h += '<div class="tab-divider"></div>';
  
  h += `<button class="tab ${S.tab==='omzet'?'active':''}" onclick="setTab('omzet')">💰 Omzet</button>`;
  h += '<div class="tab-divider"></div>';
  h += `<button class="tab ${S.tab==='kunjungan'?'active':''}" onclick="setTab('kunjungan')">👥 Kunjungan</button>`;
  h += '<div class="tab-divider"></div>';
  h += `<button class="tab ${S.tab==='mcu'?'active':''}" onclick="setTab('mcu')">🔬 Omzet MCU</button>`;
  h += '<div class="tab-divider"></div>';
  h += `<button class="tab ${S.tab==='laporan'?'active':''}" onclick="setTab('laporan')">📋 Laporan Harian</button>`;
  h += '<div class="tab-divider"></div>';
  h += `<button class="tab ${S.tab==='kunjHarian'?'active':''}" onclick="setTab('kunjHarian')">📝 Input Kunjungan</button>`;
  el.innerHTML = h;
}

function setTab(t) {
  S.tab = t;
  const bulanOrder = ['JANUARI','FEBRUARI','MARET','APRIL','MEI','JUNI','JULI','AGUSTUS','SEPTEMBER','OKTOBER','NOVEMBER','DESEMBER'];
  const sortBulan = (arr) => arr.sort((a,b) => bulanOrder.indexOf(a) - bulanOrder.indexOf(b));
  
  if (t === 'omzet' || t === 'kunjungan') {
    const ms = sortBulan(Object.keys(S.data[t]));
    if (!ms.includes(S.month)) S.month = ms[ms.length-1];
  } else if (t === 'mcu') {
    const ms = sortBulan(Object.keys(S.data.mcu || {}));
    if (!ms.includes(S.mcuMonth)) S.mcuMonth = ms[ms.length-1];
  }
  if (t !== 'kunjHarian') window._khLoaded = false;

// ── Notif saat refresh/close jika ada data yang belum disubmit ────────────────
function hasUnsavedData() {
  if (window.S && window.S.tab !== 'kunjHarian') return false;
  const hasK = KR.some(r => r.j && Object.values(
    Object.fromEntries(KC.map(c => [c, parseInt(r[c])||0]))
  ).some(v => v > 0));
  const hasM = MR.some(r => r.p && (parseInt(r.n)||0) > 0);
  return hasK || hasM;
}

window.addEventListener('beforeunload', function(e) {
  if (hasUnsavedData()) {
    e.preventDefault();
    e.returnValue = 'Data kunjungan harian belum disubmit. Yakin mau meninggalkan halaman?';
    return e.returnValue;
  }
}); // reset agar autocomplete fresh
  render();
}
function setMcuMonth(m) { S.tab = 'mcu'; S.mcuMonth = m; render(); }

function setMonth(m) { S.month = m; render(); }

const PAYERS = [
  {k:'petrokimia', l:'PT Petrokimia',   c:'#dc2626'},
  {k:'perusahaan', l:'Perusahaan Lain', c:'#2563eb'},
  {k:'bri',        l:'BRI (PG)',        c:'#f59e0b'},
  {k:'asuransi',   l:'Asuransi Lain',   c:'#7c3aed'},
  {k:'prokMurni',  l:'Prokespen Murni', c:'#0891b2'},
  {k:'prokBpjs',   l:'Prokespen BPJS',  c:'#059669'},
  {k:'bpjsKes',    l:'BPJS Kesehatan',  c:'#0d9488'},
  {k:'bpjsTK',     l:'BPJS TK',         c:'#ea580c'},
  {k:'umum',       l:'Umum',            c:'#4f46e5'},
];

const fmt  = v => {
  if (!v) return 'Rp 0';
  const jt = v / 1e6;
  if (jt >= 1000) {
    // Format as X.XXX,X jt with dot separator
    return 'Rp ' + jt.toLocaleString('id-ID', {minimumFractionDigits:1, maximumFractionDigits:1}) + ' jt';
  }
  return 'Rp ' + jt.toFixed(1) + ' jt';
};
const fmtF = v => 'Rp ' + Number(v).toLocaleString('id-ID');
const badge = p => {
  if(p>=150) return `<span class="bp">${p}%</span>`;
  if(p>=100) return `<span class="bg">${p}%</span>`;
  if(p>=80)  return `<span class="by">${p}%</span>`;
  return `<span class="br">${p}%</span>`;
};

function renderOmzet() {
  const rows = S.data.omzet[S.month] || [];
  if (!rows.length) { document.getElementById('main').innerHTML = '<div style="padding:60px;text-align:center;color:var(--mu)">Belum ada data untuk bulan ini</div>'; return; }

  const dHit   = rows.filter(r => r.pct >= 100).length;
  const best   = rows.reduce((a,b) => b.pct>a.pct?b:a);
  const avgPct = Math.round(rows.reduce((s,r) => s+r.pct, 0) / rows.length);
  const avgTgt = rows.reduce((s,r) => s+r.target, 0) / rows.length;

  const payerHtml = PAYERS.map(p => {
    const t  = rows.reduce((s,r) => s+(r[p.k]||0), 0);

    return `<div class="pc" style="--pcc:${p.c}">
      <div class="pc-n">${p.l}</div>
      <div class="pc-v" style="color:${p.c}">${fmt(t)}</div>
      <div class="pc-p">${sh}% dari total</div>
    </div>`;
  }).join('');

  const tblHtml = rows.map(r => `<tr>

    <div class="kpi-row">
      <div class="kpi" style="--kc:#0a9e87;--kbg:#e6f7f4"><div class="kpi-ico">💰</div><div class="kpi-lbl">Total Omzet ${S.month}</div><div class="kpi-val">${fmt(tot)}</div><div class="kpi-sub">${rows.length} hari tercatat</div></div>

      <div class="kpi" style="--kc:#8b5cf6;--kbg:#f3f0ff"><div class="kpi-ico">⚡</div><div class="kpi-lbl">Avg Capaian</div><div class="kpi-val">${avgPct}%</div><div class="kpi-sub">Rata-rata per hari</div></div>
    </div>

        </div>
        <canvas id="cPct"></canvas>

      <div class="card">

    <div class="card">

    </div>

  // ── Charts ──
  const days = rows.map(r => r.d);
  const gridColor = 'rgba(26,37,53,.06)';

  S.charts.daily = new Chart(document.getElementById('cDaily'), {
    data: { labels: days, datasets: [
      { type:'bar', label:'Omzet Aktual',
        data: rows.map(r=>r.total),
        backgroundColor: rows.map(r => r.pct>=100 ? 'rgba(10,158,135,.7)' : 'rgba(59,130,246,.55)'),
        borderColor:     rows.map(r => r.pct>=100 ? '#0a9e87' : '#3b82f6'),
        borderWidth: 1, borderRadius: 5, borderSkipped: false },
      { type:'line', label:'Target',

    options: { responsive:true, interaction:{mode:'index'},
      plugins:{ legend:{position:'top', labels:{padding:16}} ,
        tooltip:{callbacks:{label:c=>` ${c.dataset.label}: ${fmtF(c.raw)}`},
          backgroundColor:'#fff', titleColor:'#1a2535', bodyColor:'#3d5068',
          borderColor:'#dde4ee', borderWidth:1, padding:10 }} ,
      scales:{
        x:{ grid:{color:gridColor}, ticks:{font:{size:10}} },
        y:{ grid:{color:gridColor}, ticks:{callback:v=>'Rp '+(v/1e6).toFixed(0)+'jt', font:{size:10}} }
      }}
  });

  S.charts.pct = new Chart(document.getElementById('cPct'), {
    type:'bar',

      data: rows.map(r=>r.pct),

// ── Numeric-only input enforcement ───────────────────────────────────────────
function setupNumInput(inp) {
  inp.setAttribute('inputmode', 'numeric');
  inp.setAttribute('min', '0');
  inp.setAttribute('step', '1');
  inp.onkeydown = function(e) {
    // Allow: backspace, delete, tab, escape, enter, arrows, home, end
    const allowed = ['Backspace','Delete','Tab','Escape','Enter',
                     'ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Home','End'];
    if (allowed.includes(e.key)) return;
    // Allow Ctrl/Cmd+A, C, V, X
    if ((e.ctrlKey || e.metaKey) && ['a','c','v','x'].includes(e.key.toLowerCase())) return;
    // Block anything that's not a digit
    if (!/^[0-9]$/.test(e.key)) { e.preventDefault(); return; }
    // Block leading zeros (except clearing to 0)
    if (e.key === '0' && inp.value === '0') { e.preventDefault(); return; }
  };
  inp.onpaste = function(e) {
    const txt = (e.clipboardData || window.clipboardData).getData('text');
    if (!/^[0-9]+$/.test(txt.trim())) {
      e.preventDefault();
      toast('Hanya angka yang diperbolehkan!', 'warn');
    }
  };
}

// Auto-link MCU row ke tabel kunjungan
function autoLinkMCU(mcuRow){
  const key=mcuRow.p.trim().toUpperCase();
  const existing=KR.find(r=>r.j&&r.j.toUpperCase()===key);
  if(existing){
    // Update: MCU col di-sync via syncMCU() — sudah handled
    return;
  }
  // Tambah baris baru di KR dengan label dari mcuRow atau default NPG
  const newRow=nkr(mcuRow.p.trim(),mcuRow.k||'NPG',false);
  newRow.ok=PS.has(key)||true; // custom entry boleh
  KR.push(newRow);
}


function showAC(inp,row,type,force=false){
  const q=inp.value.trim(); 
  if(!force && q.length<2){hideAC(); return;}
  let matches = [];
  if (q.length >= 2) { matches = PL.filter(p=>p.toLowerCase().includes(q.toLowerCase())).slice(0,10); }
  else if (force) { matches = PL.slice(0, 10); }
  else { hideAC(); return; }
  const list=document.getElementById('acl'); const rect=inp.getBoundingClientRect();
  list.style.top=(rect.bottom+1)+'px'; list.style.left=rect.left+'px'; list.style.width=Math.max(rect.width,220)+'px'; list.style.display='block'; list.innerHTML='';
  ACS={inp,row,type,matches,idx:-1};
  if(!matches.length){list.innerHTML='<div style="padding:5px 10px;color:var(--danger)">✕ Tidak ada</div>'; return;}
  matches.forEach((m,i)=>{const d=document.createElement('div'); d.className='aci'; d.textContent=m; d.onmousedown=()=>selAC(i); list.appendChild(d);});
}

function hideAC(){document.getElementById('acl').style.display='none'; ACS=null;}
document.addEventListener('click', e => { if(!e.target.closest('.pw') && !e.target.closest('#acl')) hideAC(); });
function selAC(idx){
  if(!ACS)return; const val=ACS.matches[idx]; ACS.inp.value=val;
  if(ACS.type==='k'){
    ACS.row.j=val; ACS.row.ok=true;
  } else {
    ACS.row.p=val; ACS.row.ok=true;
    autoLinkMCU(ACS.row); // auto-link ke tabel kunjungan
  }
  hideAC(); syncMCU(); rK(); rM(); sv();
}

function handleKey(e){
  // Jika Autocomplete sedang terbuka, gunakan logika navigasi autocomplete
  if(ACS && ACS.matches.length > 0){
    const items=document.querySelectorAll('.aci');
    if(e.key==='ArrowDown'){e.preventDefault(); ACS.idx=Math.min(ACS.idx+1,items.length-1); items.forEach((el,i)=>el.classList.toggle('active',i===ACS.idx)); return;}
    else if(e.key==='ArrowUp'){e.preventDefault(); ACS.idx=Math.max(ACS.idx-1,0); items.forEach((el,i)=>el.classList.toggle('active',i===ACS.idx)); return;}
    else if(e.key==='Enter'&&ACS.idx>=0){e.preventDefault(); selAC(ACS.idx); return;}
    else if(e.key==='Escape'){hideAC(); return;}
  }

  // Navigasi Grid antar Kotak Input
  if(['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)){
    e.preventDefault();
    const cur = e.target;
    const cell = cur.closest('td');
    const row = cell.closest('tr');
    const table = row.closest('table');
    const colIdx = Array.from(row.cells).indexOf(cell);
    const rowIdx = Array.from(table.rows).indexOf(row);

    let target;
    if(e.key === 'ArrowUp'){
      const prevRow = table.rows[rowIdx - 1];
      if(prevRow && prevRow.cells[colIdx]){ target = prevRow.cells[colIdx].querySelector('input'); }
    } else if(e.key === 'ArrowDown'){
      const nextRow = table.rows[rowIdx + 1];
      if(nextRow && nextRow.cells[colIdx]){ target = nextRow.cells[colIdx].querySelector('input'); }
    } else if(e.key === 'ArrowLeft'){
      const prevCell = row.cells[colIdx - 1];
      if(prevCell){ target = prevCell.querySelector('input'); }
    } else if(e.key === 'ArrowRight'){
      const nextCell = row.cells[colIdx + 1];
      if(nextCell){ target = nextCell.querySelector('input'); }
    }

    if(target && target.tagName === 'INPUT' && !target.readOnly) {
      target.focus();
      // Untuk input teks, posisikan kursor di akhir
      if(target.type === 'text') {
        const len = target.value.length;
        target.setSelectionRange(len, len);
      }
    }
  }
}

// ── KUNJUNGAN HARIAN ─────────────────────────────────────────────────────────
// GAS_URL_KH = sama dengan GS_URL dashboard (1 GAS untuk semua)
// Jika GAS kunjungan terpisah, ganti nilainya
// PL/PS initialized after FALLBACK_PL (see below)

async function loadPenjamin() {
  const ind = document.getElementById('ldInd');
  try {
    const url = (typeof GAS_URL_KH !== 'undefined' ? GAS_URL_KH : GS_URL).trim();
    if (!url) throw new Error('no url');
    const r = await fetch(url + '?action=penjamin');
    const json = await r.json();
    if (json.status === 'ok' && json.data.length) {
      PL = json.data.map(d => d.nama);
      PS = new Set(PL.map(p => p.toUpperCase()));
      if (ind) { ind.textContent = PL.length + ' penjamin ✓'; setTimeout(() => { if(ind) ind.style.display='none'; }, 2000); }
      // Autocomplete list updated — rows sudah tampil, tidak perlu re-render
    }
  } catch(err) {
    PL = [...FALLBACK_PL]; PS = new Set(PL.map(p => p.toUpperCase()));
    if (ind) { ind.textContent = '⚠ offline'; ind.style.color = 'var(--warn)'; }
  }
}

async function submitToSheets() {
  const url = (typeof GAS_URL_KH !== 'undefined' ? GAS_URL_KH : GS_URL).trim();
  if (!url) { toast('GAS_URL_KH belum diisi!', 'warn'); return; }
  const date = document.getElementById('iDate').value;
  if (!date) { toast('Pilih tanggal dulu!', 'warn'); return; }
  const kunjungan = [];
  KR.forEach(r => {
    if (!r.j) return;
    KC.forEach(c => { const v = parseInt(r[c])||0; if(v>0) kunjungan.push({label:r.k||'',kategori:r.k||'',jaminan:r.j,lokasi:LOC_MAP[c],jumlah:v}); });
  });
  const mcu = MR.filter(r => r.p && (parseInt(r.n)||0) > 0).map(r => {
    const kRow = KR.find(k => k.j && k.j.toUpperCase() === r.p.toUpperCase());
    return { perusahaan:r.p, label:kRow?kRow.k||'':'', paket:r.kp||'', peserta:parseInt(r.n)||0, nominal:parseInt(r.nom)||0, total:mrt(r) };
  });
  const penjaminBaru = KR.filter(r => r.isNew && r.j).map(r => ({nama:r.j, label:r.k||''}));
  const btn = document.getElementById('btnSubmit');
  btn.disabled = true; btn.textContent = 'Mengirim...';
  try {
    await fetch(url, { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ action:'submit', tanggal:date, kunjungan, mcu, penjaminBaru }),
      mode: 'no-cors' });
    KR.forEach(r => r.isNew = false);
    // Reset data setelah submit sukses agar notif refresh tidak muncul
    KR.forEach(r => KC.forEach(c => r[c] = ''));
    MR.forEach(r => { r.n = ''; r.nom = ''; });
    rK(); rM(); updateStats();
    toast('✓ Data terkirim ke Sheets!');
  } catch(err) { toast('Gagal: ' + err.message, 'warn'); }
  finally { btn.disabled = false; btn.textContent = 'Submit ke Sheets'; }
}

}

function doExport() {
  const date = document.getElementById('iDate').value;
  if (!date) { toast('Pilih tanggal!', 'warn'); return; }
  const LC = {
    'PG'             :{bg:'DBEAFE',hdr:'1D4ED8',txt:'1E3A8A'},
    'BPJS'           :{bg:'DCFCE7',hdr:'166534',txt:'14532D'},
    'BRI LIFE PG'    :{bg:'FEE2E2',hdr:'991B1B',txt:'7F1D1D'},
    'PROKESPEN'      :{bg:'EDE9FE',hdr:'5B21B6',txt:'4C1D95'},
    'PROKESPEN BPJS' :{bg:'D9F99D',hdr:'3A5C00',txt:'365314'},
    'UMUM'           :{bg:'FEF3C7',hdr:'B45309',txt:'92400E'},
    'TUNAI'          :{bg:'FEF3C7',hdr:'B45309',txt:'92400E'},
    'JKK'            :{bg:'FCE7F3',hdr:'9D174D',txt:'831843'},
    'NPG'            :{bg:'FFEDD5',hdr:'C2410C',txt:'9A3412'},
    'AS'             :{bg:'E0E7FF',hdr:'4338CA',txt:'3730A3'},
    ''               :{bg:'F8FAFC',hdr:'475569',txt:'334155'},
  };
  const COLS_DEF=[['rj','RJ A.Yani',9],['ri','RI A.Yani',9],['igd','IGD',7],['mcu','MCU',7],['promo','Promo',8],['dokter','Dokter Luar',10],['exc','Poli Exc',8],['prior','Poli Prior',9],['grj','Grahu RJ',9],['gri','Grahu RI',9],['sat','Satelit',8],['ppk','PPK1',7]];
  const lOrder=['PG','BPJS','BRI LIFE PG','PROKESPEN','PROKESPEN BPJS','UMUM','TUNAI','JKK','NPG','AS',''];
  const pMap={}, pOrd=[];
  KR.forEach(r => {
    if (!r.j) return;
    if (!pMap[r.j]) { pMap[r.j]={label:r.k||'',data:{}}; pOrd.push(r.j); }
    KC.forEach(c => { const v=parseInt(r[c])||0; if(v>0) pMap[r.j].data[c]=(pMap[r.j].data[c]||0)+v; });
  });
  pOrd.sort((a,b) => { const la=lOrder.indexOf(pMap[a].label), lb=lOrder.indexOf(pMap[b].label); return (la<0?99:la)-(lb<0?99:lb)||a.localeCompare(b); });
  const aoa = [
    ['LAPORAN HARIAN KUNJUNGAN LABORATORIUM A. YANI','','','','','','','','','','','','','',''],
    ['Tanggal :', date,'','','','','','','','','','','','',''],
    [],
    ['KET','JAMINAN',...COLS_DEF.map(c=>c[1]),'TOTAL'],
  ];
  let prevK='';
  pOrd.forEach(j => { const r=pMap[j]; const nums=COLS_DEF.map(([k])=>r.data[k]||0); aoa.push([r.label===prevK?'':r.label, j, ...nums, nums.reduce((a,b)=>a+b,0)]); prevK=r.label; });
  const totR=COLS_DEF.map(([k])=>pOrd.reduce((s,j)=>s+(pMap[j].data[k]||0),0));
  aoa.push(['TOTAL','',...totR,totR.reduce((a,b)=>a+b,0)]);
  aoa.push([],[' REKAP PER LABEL','','','','','','','','','','','','','','']);
  aoa.push(['LABEL',...COLS_DEF.map(c=>c[1]),'TOTAL']);
  lOrder.forEach(l => { const rows=pOrd.filter(j=>pMap[j].label===l); if(!rows.length)return; const nums=COLS_DEF.map(([k])=>rows.reduce((s,j)=>s+(pMap[j].data[k]||0),0)); aoa.push([l||'LAIN-LAIN',...nums,nums.reduce((a,b)=>a+b,0)]); });
  const wb = XLSX.utils.book_new();
  const ws1 = XLSX.utils.aoa_to_sheet(aoa);
  ws1['!cols'] = [{wch:7},{wch:38},...COLS_DEF.map(c=>({wch:c[2]})),{wch:9}];
  ws1['!merges'] = [{s:{r:0,c:0},e:{r:0,c:14}}];
  XLSX.utils.book_append_sheet(wb, ws1, 'Laporan Harian');
  const mAoa = [['MCU HARIAN - '+date,'','','','','',''],['No.','Perusahaan','Label','Paket','Peserta','Nominal/Orang','Total']];
  let mp=0, mt=0;
  MR.forEach((r,i) => { if(!r.p)return; const n=parseInt(r.n)||0, nm=parseInt(r.nom)||0; const kRow=KR.find(k=>k.j&&k.j.toUpperCase()===r.p.toUpperCase()); mp+=n; mt+=n*nm; mAoa.push([i+1,r.p,kRow?kRow.k||'':'',r.kp||'',n,nm,n*nm]); });
  if (mp>0) mAoa.push(['TOTAL','','','',mp,'',mt]);
  const ws2 = XLSX.utils.aoa_to_sheet(mAoa);
  ws2['!cols'] = [{wch:5},{wch:42},{wch:8},{wch:22},{wch:9},{wch:16},{wch:18}];
  ws2['!merges'] = [{s:{r:0,c:0},e:{r:0,c:6}}];
  XLSX.utils.book_append_sheet(wb, ws2, 'MCU Harian');
  const dbK=[['Tanggal','Label','Kategori','Nama Jaminan','Lokasi','Jumlah']];
  KR.forEach(r=>{if(!r.j)return;KC.forEach(c=>{const v=parseInt(r[c])||0;if(v>0)dbK.push([date,r.k||'',r.k||'',r.j,LOC_MAP[c],v]);});});
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(dbK), 'DB Kunjungan');
  const dbM=[['Tanggal','Perusahaan','Label','Paket','Peserta','Nominal','Total']];
  MR.forEach(r=>{if(!r.p)return;const n=parseInt(r.n)||0,nm=parseInt(r.nom)||0;if(n>0){const kRow=KR.find(k=>k.j&&k.j.toUpperCase()===r.p.toUpperCase());dbM.push([date,r.p,kRow?kRow.k||'':'',r.kp||'',n,nm,n*nm]);}});
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(dbM), 'DB MCU');
  XLSX.writeFile(wb, 'Lap_' + date + '.xlsx');
  toast('Excel berhasil diexport!');
}

// ── Notif saat refresh/close jika ada data yang belum disubmit ────────────────
function hasUnsavedData() {
  if (window.S && window.S.tab !== 'kunjHarian') return false;
  const hasK = KR.some(r => r.j && Object.values(
    Object.fromEntries(KC.map(c => [c, parseInt(r[c])||0]))
  ).some(v => v > 0));
  const hasM = MR.some(r => r.p && (parseInt(r.n)||0) > 0);
  return hasK || hasM;
}

window.addEventListener('beforeunload', function(e) {
  if (hasUnsavedData()) {
    e.preventDefault();
    e.returnValue = 'Data kunjungan harian belum disubmit. Yakin mau meninggalkan halaman?';
    return e.returnValue;
  }
});
